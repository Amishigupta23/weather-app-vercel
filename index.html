<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Serverless Weather Hub | Multi-City Forecast</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            min-height: 100vh;
            padding: 20px;
        }

        /* Main Container */
        .app-container {
            max-width: 1400px;
            margin: 0 auto;
        }

        /* Header */
        .header {
            text-align: center;
            margin-bottom: 40px;
        }

        h1 {
            font-size: 2.5rem;
            background: linear-gradient(135deg, #60a5fa, #a78bfa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 10px;
        }

        .subtitle {
            color: #94a3b8;
            font-size: 0.9rem;
        }

        /* Grid Layout */
        .dashboard-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 24px;
            margin-bottom: 24px;
        }

        /* Cards */
        .card {
            background: rgba(30, 41, 59, 0.8);
            backdrop-filter: blur(10px);
            border-radius: 24px;
            padding: 24px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
        }

        .card-full {
            grid-column: 1 / -1;
        }

        .card-title {
            font-size: 1.25rem;
            font-weight: 600;
            color: #f1f5f9;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            padding-bottom: 12px;
        }

        /* Search Section */
        .search-box {
            display: flex;
            gap: 12px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        input {
            flex: 1;
            padding: 14px 18px;
            background: #1e293b;
            border: 2px solid #334155;
            border-radius: 16px;
            font-size: 16px;
            color: #f1f5f9;
            outline: none;
            transition: all 0.3s;
            font-family: inherit;
        }

        input:focus {
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.2);
        }

        input::placeholder {
            color: #64748b;
        }

        button {
            padding: 14px 28px;
            background: #3b82f6;
            color: white;
            border: none;
            border-radius: 16px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 600;
            transition: all 0.3s;
            font-family: inherit;
        }

        button:hover {
            background: #2563eb;
            transform: translateY(-2px);
        }

        button:active {
            transform: translateY(0);
        }

        button:disabled {
            background: #475569;
            cursor: not-allowed;
            transform: none;
        }

        .btn-secondary {
            background: #334155;
        }

        .btn-secondary:hover {
            background: #475569;
        }

        .btn-danger {
            background: #dc2626;
        }

        .btn-danger:hover {
            background: #b91c1c;
        }

        /* Weather Card */
        .weather-card {
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
            border-radius: 20px;
            padding: 20px;
            margin-top: 16px;
        }

        .city-name {
            font-size: 1.8rem;
            font-weight: bold;
            color: #f1f5f9;
        }

        .country {
            color: #94a3b8;
            margin-bottom: 15px;
        }

        .temperature {
            font-size: 3.5rem;
            font-weight: bold;
            color: #60a5fa;
        }

        .weather-description {
            color: #cbd5e1;
            text-transform: capitalize;
            margin: 10px 0;
        }

        .weather-details {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            margin-top: 20px;
        }

        .detail {
            background: rgba(255, 255, 255, 0.05);
            padding: 12px;
            border-radius: 12px;
            text-align: center;
        }

        .detail-label {
            font-size: 12px;
            color: #94a3b8;
            margin-bottom: 5px;
        }

        .detail-value {
            font-size: 1.1rem;
            font-weight: bold;
            color: #f1f5f9;
        }

        /* Forecast Grid */
        .forecast-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 16px;
            margin-top: 16px;
        }

        .forecast-day {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            padding: 16px;
            text-align: center;
        }

        .forecast-date {
            font-size: 0.85rem;
            color: #94a3b8;
            margin-bottom: 10px;
        }

        .forecast-temp {
            font-size: 1.25rem;
            font-weight: bold;
            color: #60a5fa;
            margin: 8px 0;
        }

        .forecast-desc {
            font-size: 0.8rem;
            color: #cbd5e1;
        }

        /* History List */
        .history-list {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 15px;
        }

        .history-btn {
            padding: 8px 16px;
            background: #1e293b;
            border-radius: 20px;
            font-size: 14px;
        }

        .history-btn:hover {
            background: #3b82f6;
        }

        /* Compare Grid */
        .compare-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 16px;
            margin-top: 16px;
        }

        .compare-city {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            padding: 16px;
        }

        .compare-city-name {
            font-size: 1.1rem;
            font-weight: bold;
            color: #60a5fa;
            margin-bottom: 10px;
        }

        /* Stats Grid */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            gap: 16px;
            margin-top: 16px;
        }

        .stat-card {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            padding: 16px;
            text-align: center;
        }

        .stat-value {
            font-size: 1.5rem;
            font-weight: bold;
            color: #60a5fa;
        }

        .stat-label {
            font-size: 0.75rem;
            color: #94a3b8;
            margin-top: 5px;
        }

        /* Loading & Error */
        .loading {
            text-align: center;
            padding: 40px;
            color: #94a3b8;
        }

        .error {
            background: rgba(220, 38, 38, 0.2);
            color: #f87171;
            padding: 15px;
            border-radius: 16px;
            text-align: center;
            margin-top: 16px;
        }

        .hidden {
            display: none;
        }

        /* Multi-city input */
        .compare-input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 16px;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .dashboard-grid {
                grid-template-columns: 1fr;
            }
            
            h1 {
                font-size: 1.75rem;
            }
            
            .search-box {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <div class="app-container">
        <div class="header">
            <h1>🌤️ Serverless Weather Hub</h1>
            <div class="subtitle">Powered by Vercel Serverless Functions + Redis Cache</div>
        </div>

        <div class="dashboard-grid">
            <!-- Left Column: Current Weather + Forecast -->
            <div class="card">
                <div class="card-title">
                    <span>🔍</span> Current Weather
                </div>
                <div class="search-box">
                    <input type="text" id="cityInput" placeholder="Enter city name (e.g., London, Tokyo, Mumbai)" autocomplete="off">
                    <button id="getWeatherBtn">Get Weather</button>
                </div>
                <div id="weatherResult"></div>
            </div>

            <!-- Right Column: Search History -->
            <div class="card">
                <div class="card-title">
                    <span>📜</span> Recent Searches
                    <button id="clearHistoryBtn" class="btn-danger" style="margin-left: auto; padding: 5px 12px; font-size: 12px;">Clear All</button>
                </div>
                <div id="historyList" class="history-list">
                    <div class="loading">No searches yet. Search for a city!</div>
                </div>
                <div class="card-title" style="margin-top: 20px;">
                    <span>📊</span> Search Statistics
                </div>
                <div id="statsContainer"></div>
            </div>
        </div>

        <!-- 5-Day Forecast Section -->
        <div class="card card-full" id="forecastSection" style="display: none;">
            <div class="card-title">
                <span>📅</span> 5-Day Forecast
            </div>
            <div id="forecastResult"></div>
        </div>

        <!-- Multi-City Comparison Section -->
        <div class="card card-full">
            <div class="card-title">
                <span>🏙️</span> Multi-City Comparison
            </div>
            <div class="compare-input-group">
                <input type="text" id="compareCitiesInput" placeholder="Enter cities separated by commas (e.g., London, Tokyo, New York)">
                <button id="compareBtn">Compare Cities</button>
            </div>
            <div id="compareResult"></div>
        </div>
    </div>

    <script>
        // DOM Elements
        const cityInput = document.getElementById('cityInput');
        const getWeatherBtn = document.getElementById('getWeatherBtn');
        const weatherResult = document.getElementById('weatherResult');
        const historyList = document.getElementById('historyList');
        const statsContainer = document.getElementById('statsContainer');
        const forecastSection = document.getElementById('forecastSection');
        const forecastResult = document.getElementById('forecastResult');
        const compareCitiesInput = document.getElementById('compareCitiesInput');
        const compareBtn = document.getElementById('compareBtn');
        const compareResult = document.getElementById('compareResult');
        const clearHistoryBtn = document.getElementById('clearHistoryBtn');

        let currentCity = '';

        // ========== WEATHER FUNCTIONS ==========
        async function getWeather(city) {
            if (!city) {
                showError(weatherResult, 'Please enter a city name 🌍');
                return;
            }

            showLoading(weatherResult);

            try {
                const response = await fetch(`/api/weather?city=${encodeURIComponent(city)}`);
                const data = await response.json();

                if (!response.ok) {
                    throw new Error(data.message || 'Failed to fetch weather');
                }

                displayWeather(data);
                currentCity = data.city;
                
                // Save to history
                await saveToHistory(data.city, data.temperature, data.description);
                
                // Load forecast
                await getForecast(data.city);
                
                // Refresh history and stats
                await loadHistory();
                await loadStats();

            } catch (error) {
                showError(weatherResult, error.message);
                forecastSection.style.display = 'none';
            }
        }

        function displayWeather(data) {
            weatherResult.innerHTML = `
                <div class="weather-card">
                    <div class="city-name">${data.city}</div>
                    <div class="country">${data.country}</div>
                    <div class="temperature">${Math.round(data.temperature)}°C</div>
                    <div class="weather-description">${data.description}</div>
                    <div class="weather-details">
                        <div class="detail">
                            <div class="detail-label">💧 Humidity</div>
                            <div class="detail-value">${data.humidity}%</div>
                        </div>
                        <div class="detail">
                            <div class="detail-label">💨 Wind Speed</div>
                            <div class="detail-value">${data.windSpeed} m/s</div>
                        </div>
                        <div class="detail">
                            <div class="detail-label">🌡️ Feels Like</div>
                            <div class="detail-value">${Math.round(data.feelsLike)}°C</div>
                        </div>
                    </div>
                </div>
            `;
        }

        // ========== FORECAST FUNCTIONS ==========
        async function getForecast(city) {
            try {
                const response = await fetch(`/api/forecast?city=${encodeURIComponent(city)}`);
                const data = await response.json();

                if (response.ok && data.forecast) {
                    displayForecast(data);
                    forecastSection.style.display = 'block';
                } else {
                    forecastSection.style.display = 'none';
                }
            } catch (error) {
                console.error('Forecast error:', error);
                forecastSection.style.display = 'none';
            }
        }

        function displayForecast(data) {
            forecastResult.innerHTML = `
                <div class="forecast-grid">
                    ${data.forecast.map(day => `
                        <div class="forecast-day">
                            <div class="forecast-date">${new Date(day.date).toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' })}</div>
                            <div class="forecast-temp">${Math.round(day.temp_avg)}°C</div>
                            <div class="forecast-desc">${day.description}</div>
                            <div style="font-size: 0.75rem; color: #64748b; margin-top: 5px;">
                                ↑${Math.round(day.temp_max)}° ↓${Math.round(day.temp_min)}°
                            </div>
                        </div>
                    `).join('')}
                </div>
            `;
        }

        // ========== HISTORY FUNCTIONS ==========
        async function saveToHistory(city, temperature, conditions) {
            try {
                await fetch('/api/history', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ city, temperature, conditions })
                });
            } catch (error) {
                console.error('Failed to save to history:', error);
            }
        }

        async function loadHistory() {
            try {
                const response = await fetch('/api/history');
                const data = await response.json();

                if (data.history && data.history.length > 0) {
                    historyList.innerHTML = data.history.map(item => `
                        <button class="history-btn" onclick="getWeather('${item.city}')">
                            ${item.city} (${Math.round(item.temperature)}°C)
                        </button>
                    `).join('');
                } else {
                    historyList.innerHTML = '<div style="color: #64748b;">No searches yet. Search for a city!</div>';
                }
            } catch (error) {
                console.error('Failed to load history:', error);
            }
        }

        async function clearHistory() {
            try {
                await fetch('/api/history', { method: 'DELETE' });
                await loadHistory();
                await loadStats();
                showToast('History cleared!');
            } catch (error) {
                console.error('Failed to clear history:', error);
            }
        }

        // ========== STATISTICS FUNCTIONS ==========
        async function loadStats() {
            try {
                const response = await fetch('/api/stats');
                const data = await response.json();

                if (data.total_searches !== undefined) {
                    statsContainer.innerHTML = `
                        <div class="stats-grid">
                            <div class="stat-card">
                                <div class="stat-value">${data.total_searches}</div>
                                <div class="stat-label">Total Searches</div>
                            </div>
                            <div class="stat-card">
                                <div class="stat-value">${data.most_searched_city || 'N/A'}</div>
                                <div class="stat-label">Most Searched</div>
                            </div>
                            <div class="stat-card">
                                <div class="stat-value">${data.avg_temperature || '0'}°C</div>
                                <div class="stat-label">Avg Temperature</div>
                            </div>
                        </div>
                    `;
                } else {
                    statsContainer.innerHTML = '<div style="color: #64748b;">Search for cities to see stats!</div>';
                }
            } catch (error) {
                console.error('Failed to load stats:', error);
            }
        }

        // ========== MULTI-CITY COMPARISON ==========
        async function compareCities() {
            const citiesInput = compareCitiesInput.value.trim();
            if (!citiesInput) {
                showError(compareResult, 'Please enter cities separated by commas');
                return;
            }

            showLoading(compareResult);

            try {
                const response = await fetch(`/api/compare?cities=${encodeURIComponent(citiesInput)}`);
                const data = await response.json();

                if (data.results && data.results.length > 0) {
                    compareResult.innerHTML = `
                        <div class="compare-grid">
                            ${data.results.map(city => `
                                <div class="compare-city">
                                    <div class="compare-city-name">${city.city}, ${city.country}</div>
                                    <div style="font-size: 2rem; font-weight: bold; color: #60a5fa;">${Math.round(city.temperature)}°C</div>
                                    <div style="color: #cbd5e1;">${city.conditions}</div>
                                    <div style="margin-top: 10px; font-size: 0.85rem;">
                                        <div>💧 ${city.humidity}%</div>
                                        <div>💨 ${city.wind_speed} m/s</div>
                                    </div>
                                </div>
                            `).join('')}
                        </div>
                        ${data.errors && data.errors.length > 0 ? `
                            <div class="error" style="margin-top: 16px;">
                                ⚠️ Could not fetch: ${data.errors.map(e => e.city).join(', ')}
                            </div>
                        ` : ''}
                    `;
                } else {
                    showError(compareResult, 'No cities found. Check spelling and try again.');
                }
            } catch (error) {
                showError(compareResult, 'Failed to compare cities');
            }
        }

        // ========== HELPER FUNCTIONS ==========
        function showLoading(container) {
            container.innerHTML = '<div class="loading">⏳ Loading weather data...</div>';
        }

        function showError(container, message) {
            container.innerHTML = `<div class="error">❌ ${message}</div>`;
        }

        function showToast(message) {
            // Simple toast notification
            const toast = document.createElement('div');
            toast.textContent = message;
            toast.style.cssText = `
                position: fixed;
                bottom: 20px;
                right: 20px;
                background: #22c55e;
                color: white;
                padding: 12px 24px;
                border-radius: 12px;
                z-index: 1000;
                animation: fadeOut 3s forwards;
            `;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }

        // ========== EVENT LISTENERS ==========
        getWeatherBtn.addEventListener('click', () => getWeather(cityInput.value.trim()));
        cityInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') getWeather(cityInput.value.trim());
        });
        compareBtn.addEventListener('click', compareCities);
        clearHistoryBtn.addEventListener('click', clearHistory);

        // Load history and stats on page load
        loadHistory();
        loadStats();

        // Focus on input
        cityInput.focus();

        // Add animation style
        const style = document.createElement('style');
        style.textContent = `
            @keyframes fadeOut {
                0% { opacity: 1; transform: translateY(0); }
                70% { opacity: 1; }
                100% { opacity: 0; transform: translateY(-20px); visibility: hidden; }
            }
        `;
        document.head.appendChild(style);
    </script>
</body>
</html>
